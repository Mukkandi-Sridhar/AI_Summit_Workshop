<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AI Summit Live</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    height:100vh;
    background:#0b0e15;
    font-family:Segoe UI,Inter,sans-serif;
    color:white;
    overflow:hidden;
}

/* MAIN LAYOUT */
.container{
    height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:space-between;
    padding:16px 20px;
}

/* HEADER */
.header{
    width:100%;
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
}

.title{
    font-size:34px;
    font-weight:700;
}
.title span{
    font-weight:300;
    color:#9bb0d9;
}

.host{
    font-size:14px;
    opacity:.7;
}

.live{
    background:#bf3a2f;
    padding:6px 14px;
    border-radius:20px;
    font-size:12px;
    font-weight:600;
}

/* LABEL */
.video-label{
    width:100%;
    font-size:12px;
    letter-spacing:.2em;
    text-transform:uppercase;
    color:#8ca3c9;
    margin-top:6px;
}

/* VIDEO AREA */
.video-wrapper{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    width:100%;
}

/* PERFECT CENTERED VIDEO */
.video-frame{
    width:min(88vw,1280px);
    aspect-ratio:16/9;
    background:black;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 25px 60px rgba(0,0,0,.6);
}

.video-frame iframe{
    width:100%;
    height:100%;
    border:none;
}

/* PARTICIPANTS */
.attendees{
    display:flex;
    gap:32px;
    margin-top:10px;
    flex-wrap:wrap;
    justify-content:center;
}

.attendee{
    text-align:center;
    font-size:13px;
}

.role{
    font-size:11px;
    color:#9fb8e6;
    text-transform:uppercase;
}

/* FOOTER */
.footer{
    margin-top:8px;
    font-size:13px;
    opacity:.75;
}

.footer strong{color:#adc4ff;}

@media(max-width:900px){
    .title{font-size:24px;}
    .video-frame{width:95vw;}
    .attendees{gap:14px;}
}
</style>
</head>

<body>

<div class="container">

<div class="header">
  <div>
    <div class="title">AI SUMMIT <span>· live</span></div>
    <div class="host">RGM College of Engineering and Technology · CSE (AI&ML)</div>
  </div>
  <div class="live">NOW STREAMING</div>
</div>

<div class="video-label">KEYNOTE ADDRESS</div>

<div class="video-wrapper">
  <div class="video-frame">
    <iframe
      src="https://www.youtube.com/embed/cmeh2t_TeuA?rel=0&modestbranding=1"
      allowfullscreen>
    </iframe>
  </div>
</div>

<div class="attendees">
  <div class="attendee">Sundar Pichai<div class="role">Google CEO</div></div>
  <div class="attendee">Satya Nadella<div class="role">Microsoft CEO</div></div>
  <div class="attendee">Sam Altman<div class="role">OpenAI CEO</div></div>
  <div class="attendee">Jensen Huang<div class="role">NVIDIA CEO</div></div>
  <div class="attendee">Demis Hassabis<div class="role">DeepMind CEO</div></div>
</div>

<div class="footer">
Organized by <strong>AI CLUB RGMCET</strong> — Department of CSE-AI&ML
</div>

</div>

</body>
</html>
