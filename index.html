<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Gen AI Workshop | AI CLUB RGMCET</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    background:radial-gradient(circle at top,#0d2f5e 0%,#020817 70%);
    color:white;
}

/* BACKGROUND GLOW */
body::before{
    content:"";
    position:absolute;
    width:600px;
    height:600px;
    background:#00bfff33;
    filter:blur(150px);
    top:-200px;
    left:50%;
    transform:translateX(-50%);
    z-index:-1;
}

/* MAIN LAYOUT */
.container{
    height:100%;
    width:100%;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    align-items:center;
    padding:2vh 2vw;
}

/* TOP INFO */
.top{
    text-align:center;
    animation:fadeDown 1s ease;
}

.college{
    font-size:1.6vw;
    font-weight:700;
    color:#f4c26b;
}

.sub{
    font-size:.9vw;
    opacity:.85;
    margin-top:4px;
}

.dept{
    margin-top:8px;
    color:#61dafb;
    font-size:1.1vw;
    font-weight:600;
}

.date{
    margin-top:10px;
    display:inline-block;
    padding:8px 20px;
    border:1.5px solid #f4c26b;
    border-radius:30px;
    font-size:.9vw;
    color:#f4c26b;
    backdrop-filter:blur(6px);
}

/* TITLE */
.title{
    text-align:center;
    animation:fadeUp 1.2s ease;
}

.title h1{
    font-size:3.2vw;
    font-weight:800;
    letter-spacing:.5px;
}

.title span{
    color:#00bfff;
}

.title p{
    font-size:1.3vw;
    color:#f4c26b;
    font-style:italic;
}

/* VIDEO HERO */
.video-wrap{
    width:70%;
    max-width:1100px;
    aspect-ratio:16/9;
    border-radius:24px;
    overflow:hidden;
    background:rgba(255,255,255,.04);
    backdrop-filter:blur(12px);
    box-shadow:
      0 0 30px rgba(0,191,255,.5),
      0 0 120px rgba(0,191,255,.15);
    animation:zoomIn 1.3s ease;
    transition:.4s;
}

.video-wrap:hover{
    transform:scale(1.01);
}

iframe{
    width:100%;
    height:100%;
    border:none;
}

/* FOOTER */
.footer{
    font-size:1vw;
    opacity:.9;
    animation:fadeUp 1.4s ease;
}

.footer span{
    color:#00bfff;
    font-weight:700;
}

/* QUOTES AREA */
.best{
    position:absolute;
    bottom:10px;
    left:50%;
    transform:translateX(-50%);
    width:90%;
    text-align:center;
    font-size:.85vw;
    color:#d8eaff;
    opacity:.85;
    pointer-events:none;
}

/* quote fade animation */
.fade{
    animation:fadeQuote 1s ease;
}

@keyframes fadeQuote{
    from{
        opacity:0;
        transform:translateY(8px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* ANIMATIONS */
@keyframes fadeDown{
    from{opacity:0;transform:translateY(-30px);}
    to{opacity:1;transform:translateY(0);}
}

@keyframes fadeUp{
    from{opacity:0;transform:translateY(30px);}
    to{opacity:1;transform:translateY(0);}
}

@keyframes zoomIn{
    from{opacity:0;transform:scale(.92);}
    to{opacity:1;transform:scale(1);}
}

/* MOBILE */
@media(max-width:900px){
    .college{font-size:4vw;}
    .sub{font-size:2.8vw;}
    .dept{font-size:3vw;}
    .date{font-size:2.6vw;}
    .title h1{font-size:7vw;}
    .title p{font-size:4vw;}
    .footer{font-size:3vw;}
    .video-wrap{width:95%;}
    .best{font-size:2.4vw;width:95%;}
}
</style>
</head>

<body>

<div class="container">

    <div class="top">
        <div class="college">RGM College of Engineering and Technology (Autonomous)</div>
        <div class="sub">NBA, NAAC A+, Nandyal - 518501, Andhra Pradesh</div>
        <div class="dept">CSE (Artificial Intelligence & Machine Learning)</div>
        <div class="date">21st February 2026</div>
    </div>

    <div class="title">
        <h1>WORKSHOP ON <span>Gen AI</span> & <span>Prompt Engineering</span></h1>
        <p>Techniques</p>
    </div>

    <div class="video-wrap">
        <iframe
        src="https://www.youtube.com/embed/cmeh2t_TeuA?cc_load_policy=1&rel=0"
        allowfullscreen>
        </iframe>
    </div>

    <div class="footer">
        Organized by <span>AI CLUB RGMCET</span> — Department of CSE-AI&ML
    </div>

</div>

<div class="best">
    <span id="quoteText"></span>
</div>

<script>
const quotes = [
"Artificial intelligence is the new electricity. — Andrew Ng",
"AI will impact every job, every industry, every country. — Satya Nadella",
"AI is here. It’s not the future — it’s now.",
"Machine learning is pattern recognition at scale.",
"AI learns what we teach it — on purpose or not.",
"AI is not a substitute for human intelligence. It amplifies it. — Fei-Fei Li",
"Bias in, bias out.",
"The future is written in data.",
"AI ethics isn’t a side project — it’s the foundation.",
"We are not just building smarter machines. We are redefining humanity.",
"The future is not AI vs humans. It’s AI with humans. — Satya Nadella",
"Use AI to inspire, not to control.",
"AI mirrors our minds — flaws and all.",
"Smart doesn’t mean wise.",
"Technology builds tools. Humans define purpose."
];

let index = 0;
const quoteEl = document.getElementById("quoteText");

function showQuote(){
    quoteEl.classList.remove("fade");
    void quoteEl.offsetWidth; // restart animation
    quoteEl.innerText = quotes[index];
    quoteEl.classList.add("fade");
    index = (index + 1) % quotes.length;
}

showQuote();
setInterval(showQuote, 5000);
</script>

</body>
</html>
