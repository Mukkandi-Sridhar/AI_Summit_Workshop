<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AI Club Live Session</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    background:radial-gradient(circle at top,#103b72 0%,#020817 70%);
    color:white;
}

/* soft glow */
body::before{
    content:"";
    position:absolute;
    width:700px;
    height:700px;
    background:#00bfff30;
    filter:blur(150px);
    top:-250px;
    left:50%;
    transform:translateX(-50%);
    z-index:-1;
}

/* MAIN */
.container{
    height:100%;
    display:flex;
    flex-direction:column;
    padding:1.5vh 1.5vw;
}

/* HEADER */
.header{
    text-align:center;
    animation:fadeDown 1s ease;
}

.header h2{
    color:#f4c26b;
    font-size:1.5vw;
}

.header p{
    opacity:.85;
    font-size:.9vw;
}

.live{
    display:inline-block;
    margin-top:8px;
    padding:6px 14px;
    background:#ff003355;
    border:1px solid #ff0033;
    border-radius:20px;
    font-size:.8vw;
    animation:pulse 2s infinite;
}

/* MAIN MEETING AREA */
.meeting{
    flex:1;
    display:grid;
    grid-template-columns:220px 1fr;
    gap:16px;
    margin-top:12px;
}

/* PARTICIPANTS */
.participants{
    background:rgba(255,255,255,.04);
    border-radius:16px;
    padding:12px;
    backdrop-filter:blur(10px);
    box-shadow:0 0 20px rgba(0,191,255,.2);
    animation:fadeUp 1.2s ease;
}

.participants h3{
    font-size:.95vw;
    margin-bottom:10px;
    color:#61dafb;
}

.user{
    display:flex;
    align-items:center;
    margin-bottom:10px;
    gap:10px;
}

.avatar{
    width:34px;
    height:34px;
    border-radius:50%;
    background:linear-gradient(135deg,#00bfff,#4facfe);
    box-shadow:0 0 10px rgba(0,191,255,.6);
}

.user span{
    font-size:.8vw;
}

/* VIDEO AREA */
.video-area{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}

.video-label{
    margin-bottom:8px;
    font-size:.9vw;
    color:#61dafb;
}

.video-wrap{
    width:85%;
    max-width:1050px;
    aspect-ratio:16/9;
    border-radius:22px;
    overflow:hidden;
    background:rgba(255,255,255,.04);
    backdrop-filter:blur(12px);
    box-shadow:
      0 0 30px rgba(0,191,255,.5),
      0 0 100px rgba(0,191,255,.15);
    animation:zoomIn 1.2s ease;
}

iframe{
    width:100%;
    height:100%;
    border:none;
}

/* FOOTER */
.footer{
    text-align:center;
    font-size:.9vw;
    margin-top:8px;
}

.footer span{
    color:#00bfff;
    font-weight:700;
}

/* QUOTES */
.quote{
    position:absolute;
    bottom:8px;
    left:50%;
    transform:translateX(-50%);
    width:90%;
    text-align:center;
    font-size:.8vw;
    opacity:.85;
    color:#d8eaff;
}

.fade{
    animation:fadeQuote 1s ease;
}

/* ANIMATIONS */
@keyframes fadeDown{
    from{opacity:0;transform:translateY(-25px);}
    to{opacity:1;transform:translateY(0);}
}

@keyframes fadeUp{
    from{opacity:0;transform:translateY(25px);}
    to{opacity:1;transform:translateY(0);}
}

@keyframes zoomIn{
    from{opacity:0;transform:scale(.95);}
    to{opacity:1;transform:scale(1);}
}

@keyframes pulse{
    0%{box-shadow:0 0 0 rgba(255,0,51,0);}
    50%{box-shadow:0 0 15px rgba(255,0,51,.6);}
    100%{box-shadow:0 0 0 rgba(255,0,51,0);}
}

@keyframes fadeQuote{
    from{opacity:0;transform:translateY(8px);}
    to{opacity:1;transform:translateY(0);}
}

/* MOBILE */
@media(max-width:900px){
    .meeting{
        grid-template-columns:1fr;
    }
    .participants{
        display:none;
    }
    .header h2{font-size:4vw;}
    .header p{font-size:2.5vw;}
    .live{font-size:2.3vw;}
    .video-label{font-size:2.5vw;}
    .footer{font-size:2.5vw;}
    .quote{font-size:2.3vw;}
}
</style>
</head>

<body>

<div class="container">

<div class="header">
    <h2>RGM College of Engineering and Technology (Autonomous)</h2>
    <p>CSE (Artificial Intelligence & Machine Learning)</p>
    <div class="live">🔴 LIVE — AI CLUB SESSION</div>
</div>

<div class="meeting">

    <!-- PARTICIPANTS -->
    <div class="participants">
        <h3>Participants</h3>

        <div class="user"><div class="avatar"></div><span>AI Research Lead</span></div>
        <div class="user"><div class="avatar"></div><span>Prompt Engineer</span></div>
        <div class="user"><div class="avatar"></div><span>ML Engineer</span></div>
        <div class="user"><div class="avatar"></div><span>Industry Mentor</span></div>
        <div class="user"><div class="avatar"></div><span>AI Club Host</span></div>
    </div>

    <!-- VIDEO -->
    <div class="video-area">
        <div class="video-label">🎤 Keynote Speaker (Live)</div>

        <div class="video-wrap">
            <iframe
            src="https://www.youtube.com/embed/cmeh2t_TeuA?cc_load_policy=1&rel=0"
            allowfullscreen>
            </iframe>
        </div>
    </div>

</div>

<div class="footer">
Organized by <span>AI CLUB RGMCET</span> — Department of CSE-AI&ML
</div>

</div>

<div class="quote"><span id="quoteText"></span></div>

<script>
const quotes=[
"Artificial intelligence is the new electricity. — Andrew Ng",
"AI will impact every industry. — Satya Nadella",
"AI is not replacing humans — it amplifies us.",
"Bias in, bias out.",
"The future is written in data.",
"Use AI to inspire, not to control."
];

let i=0;
const q=document.getElementById("quoteText");

function changeQuote(){
    q.classList.remove("fade");
    void q.offsetWidth;
    q.innerText=quotes[i];
    q.classList.add("fade");
    i=(i+1)%quotes.length;
}
changeQuote();
setInterval(changeQuote,5000);
</script>

</body>
</html>
